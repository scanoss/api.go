version: "2"
run:
  timeout: 5m

formatters:
  enable:
    - gci
    - goimports
  settings:
    gci:
      sections:
        - standard
        - default

linters:
  enable:
    - cyclop
    - errname
    - exhaustive
    - funlen
    - gocognit
    - goconst
    - gocritic
    - godot
    - gosec
    - lll
    - loggercheck
    - makezero
    - nakedret
    - nilerr
    - nilnil
    - nolintlint
    - nonamedreturns
    - predeclared
    - reassign
    - staticcheck
    - unconvert
    - unparam
    - usestdlibvars
    - whitespace

  settings:
    cyclop:
      max-complexity: 30
      package-average: 10.0
    errcheck:
      check-type-assertions: true
    exhaustive:
      check:
        - switch
        - map
    funlen:
      lines: 150
      statements: 80
    gocognit:
      min-complexity: 40
    gosec:
      excludes:
        - G117
        - G304
    govet:
      enable-all: true
      disable:
        - fieldalignment
      settings:
        shadow:
          strict: true
    nakedret:
      max-func-lines: 10
    lll:
      line-length: 180
    staticcheck:
      checks: ["all", "-SA1019"]

  exclusions:
    paths:
      - tests
    rules:
      - path: _test\.go
        linters:
          - gocognit
          - govet
          - cyclop
          - godot
          - funlen
