server:
  http_listen_port: 9080
  grpc_listen_port: 0
  log_level: info

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: scanoss-api
    static_configs:
      - targets:
          - localhost
        labels:
          job: scanoss-api
          __path__: /var/log/scanoss/api/*.log

    pipeline_stages:
      - json:
          expressions:
            level: level
            ts: ts
            msg: msg
            caller: caller
            trace_id: trace_id
            span_id: span_id
            reqId: reqId
      - timestamp:
          source: ts
          format: Unix
      - labels:
          level:
          span_id:
          trace_id:
          reqId:
      - output:
          source: msg