services:
  # SCANOSS API with telemetry enabled
  scanoss-api:
    build: ..
    ports:
      - "5443:5443"
    environment:
      - OTEL_ENABLED=true
      - OTEL_EXTRA=true
      - OTEL_EXPORTER_OLTP=otel-collector:4317
    volumes:
      - ./config:/app/config
      - ../test-support/scanoss.sh:/usr/local/bin/scanoss:ro
      - ./logs/scanoss/api:/var/log/scanoss/api:rw
    command: ["-json-config", "/app/config/app-config-demo.json", "-debug"]
    depends_on:
      - otel-collector
    networks:
      - monitoring
    restart: unless-stopped

  # OpenTelemetry Collector - receives metrics from API
  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    command: ["--config=/etc/otel-collector-config.yml"]
    volumes:
      - ./otel-collector-config.yml:/etc/otel-collector-config.yml
    ports:
      - "4317:4317"   # OTLP gRPC receiver
      - "4318:4318"   # OTLP HTTP receiver  
      - "8889:8889"   # Prometheus metrics from collector
    depends_on:
      - prometheus
      - loki
    networks:
      - monitoring
    restart: unless-stopped

  # Collect logs
  promtail:
    image: grafana/promtail:3.0.0
    command: -config.file=/etc/promtail/promtail-config.yml
    volumes:
      - ./promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      - ./logs/scanoss/api:/var/log/scanoss/api:ro
      - promtail-positions:/tmp
    depends_on:
      - loki
    networks:
      - monitoring
    restart: unless-stopped

  # Prometheus - stores metrics from OTEL collector
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--web.enable-remote-write-receiver'
      - '--storage.tsdb.path=/prometheus'  
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
      - '--enable-feature=exemplar-storage'
    networks:
      - monitoring
    restart: unless-stopped

  # ─── Tempo ────────────────
  tempo:
    image: grafana/tempo:2.4.1
    container_name: tempo
    restart: unless-stopped
    volumes:
      - ./tempo.yaml:/etc/tempo/tempo.yaml:ro
      - tempo_data:/var/tempo
    ports:
      - "3200:3200"   # Tempo HTTP API (queried by Grafana)
      - "4317"        # internal OTLP gRPC (not exposed externally — collector talks to it)
    command: ["-config.file=/etc/tempo/tempo.yaml"]
    networks:
      - monitoring

  # ─── Loki ─────────────────────
  loki:
    image: grafana/loki:2.9.7
    container_name: loki
    restart: unless-stopped
    volumes:
      - ./loki.yaml:/etc/loki/loki.yaml:ro
      - loki_data:/loki
    ports:
      - "3100:3100"
    command: ["-config.file=/etc/loki/loki.yaml"]
    networks:
      - monitoring

  # Grafana - creates graphs from Prometheus data
  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin   # dev convenience — lock down for prod
#    environment:
#      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana-datasources.yaml:/etc/grafana/provisioning/datasources/datasources.yaml:ro
    depends_on:
      - prometheus
      - loki
    networks:
      - monitoring
    restart: unless-stopped

# Networking ─────────────────────
networks:
  monitoring:
    driver: bridge
# Volumes ─────────────────────
volumes:
  prometheus_data:
  grafana_data:
  loki_data:
  tempo_data:
  promtail-positions: